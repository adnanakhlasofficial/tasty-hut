<!DOCTYPE html>
<html data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <body class="font-poppins">
    <header>
      <nav class="wrapper py-[1.87rem] flex justify-between items-center">

        <div>

        </div>
      </nav>
      <section>
        <div class="hero bg-heroBg w-auto py-36">
          <div class="hero-content block text-center space-y-8">
            <div class="max-w-[49.125rem] space-y-6">
              <h1 class="heading">

        </div>

            <!-- Content -->
            <div class="space-y-6">

    </main>

</html>
