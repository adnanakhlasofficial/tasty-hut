<!DOCTYPE html>
<html data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <body class="font-poppins">
    <header>
      <nav class="wrapper py-[1.87rem] flex justify-between items-center">
        <div>
          <img src="./images/logo.webp" alt="Logo" />
        </div>
        <div>
          <button class="btn-main">Sign Up</button>
        </div>
      </nav>
      <section>
        <div class="hero bg-heroBg w-auto py-36">
          <div class="hero-content block text-center space-y-8">
            <div class="max-w-[49.125rem] space-y-6">
              <h1 class="heading">
                Taste Our Delicious <br />
                Best Foods
              </h1>
              <p class="desc text-white">
                Provident cupiditate voluptatem et in. Quaerat fugiat ut
                assumenda excepturi exercitationem quasi. In deleniti eaque aut
                repudiandae et a id nisi.
              </p>
            </div>
            <div>
              <div class="w-full flex">
                <input
                  id="search"
                  class="py-[1.06rem] px-5 w-full inline-block rounded-r-none focus:border-none focus:outline-none rounded-lg"
                  placeholder="Search any Food"
                />
                <button
                  onclick="getSearchValue()"
                  class="btn-main rounded-l-none"
                >
                  Seach
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </header>
    <!-- Main Section -->
    <main class="wrapper my-[7.5rem]">
      <section>
        <h2 class="title">Your Favourite Food</h2>
        <!-- Cards Container -->
        <div
          id="cards-container"
          class="mt-12 grid grid-cols-1 lg:grid-cols-2 gap-6"
        ></div>

        <div class="mt-20 grid place-items-center">
          <button id="show-btn" class="btn-main" onclick="fetchData(true)">
            Show All
          </button>
        </div>
      </section>
    </main>

    <script src="./src/index.js"></script>
  </body>
</html>
